<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festival — Cahier interactif · Leçon 0 à 4 (FR · EN)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Patrick+Hand&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================
   THEME VARIABLES
   ========================================================= */
:root{
  --bg-a:#e9ddb8; --bg-b:#d9c795;
  --paper:#f8f3e6; --paper-line:#dcd0ab;
  --rule:#cfd9e8; --margin:#d9564a;
  --ink:#1e3a5c; --ink2:#2b4c86; --muted:#7a7157;
  --card:#fffdf6; --kraft:#a97a4a; --kraft-d:#6f4e2c;
  --ok:#2f8f5b; --ok-bg:#eaf7ee; --bad:#c1392b; --bad-bg:#fdeceb;
  --chip:#efe2c2; --chip-b:#c9b47f;
  --shadow: rgba(60,40,10,0.22);
  --te:#7a3ba0;
}
html[data-theme="dark"]{
  --bg-a:#171a24; --bg-b:#11131b;
  --paper:#1e2230; --paper-line:#2c3244;
  --rule:#2a3550; --margin:#e0685c;
  --ink:#eae3cf; --ink2:#9fc0ff; --muted:#9aa0b4;
  --card:#242938; --kraft:#c99a63; --kraft-d:#e9c896;
  --ok:#57c98a; --ok-bg:#173226; --bad:#ef6259; --bad-bg:#3a1e1c;
  --chip:#2a3040; --chip-b:#454e68;
  --shadow: rgba(0,0,0,0.55);
  --te:#c79bff;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background: radial-gradient(ellipse at top left, var(--bg-a) 0%, var(--bg-b) 100%);
  font-family:'Nunito',sans-serif; color:var(--ink);
  min-height:100vh; padding-bottom:60px; transition:background .3s ease,color .3s ease;
}
.te{ font-family:'Noto Sans Telugu',sans-serif; color:var(--te); }
.pron-hint{ font-family:'Space Mono',monospace; color:var(--ok); font-size:13px; font-weight:700; background:var(--ok-bg); padding:2px 8px; border-radius:6px; }
.pron-bracket{ font-family:'Space Mono',monospace; font-size:12px; color:var(--ok); background:var(--ok-bg); border:1px dashed var(--ok); border-radius:6px; padding:2px 8px; margin-left:6px; white-space:nowrap; }
h1,h2,h3{ font-family:'Caveat',cursive; }
button{ font-family:inherit; cursor:pointer; }
.wrap{ max-width:980px; margin:0 auto; padding:14px; }

/* =========================================================
   TOP BAR
   ========================================================= */
.topbar{
  position:sticky; top:0; z-index:40;
  background: linear-gradient(135deg, var(--kraft) 0%, var(--kraft-d) 100%);
  color:#2a1c0c; padding:12px 16px; border-radius:0 0 14px 14px;
  box-shadow:0 8px 22px -10px var(--shadow);
}
html[data-theme="dark"] .topbar{ color:#20140a; }
.topbar-row{ display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
.brand{ display:flex; align-items:center; gap:10px; }
.brand h1{ font-size:26px; margin:0; line-height:1; }
.brand small{ display:block; font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.1em; opacity:.8; }
.top-actions{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.btn{
  border:none; border-radius:20px; padding:8px 14px; font-weight:700; font-size:13px;
  background:rgba(255,255,255,.35); color:#2a1c0c;
}
html[data-theme="dark"] .btn{ background:rgba(0,0,0,.28); color:#f4e9d4; }
.btn:hover{ filter:brightness(1.08); }
.btn.primary{ background:var(--ink); color:#fff; }
.btn.small{ padding:5px 10px; font-size:12px; }
.theme-toggle{ width:40px; height:40px; border-radius:50%; border:none; font-size:18px; background:rgba(255,255,255,.4); }
html[data-theme="dark"] .theme-toggle{ background:rgba(0,0,0,.3); }

.scoreboard{ display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; font-family:'Space Mono',monospace; font-size:12px; }
.pill{ background:rgba(0,0,0,.16); padding:5px 12px; border-radius:20px; display:flex; align-items:center; gap:6px; }
html[data-theme="dark"] .pill{ background:rgba(0,0,0,.35); }
.progress-outer{ height:9px; background:rgba(0,0,0,.18); border-radius:6px; margin-top:10px; overflow:hidden; }
.progress-inner{ height:100%; background: var(--ink); width:0%; transition:width .4s ease; border-radius:6px; }
.stars{ letter-spacing:2px; }

/* =========================================================
   NAV / TABS
   ========================================================= */
.nav-wrap{ margin-top:14px; }
.tabs{ display:flex; gap:6px; flex-wrap:wrap; }
.tab-btn{
  font-family:'Caveat',cursive; font-weight:700; font-size:19px;
  background:var(--chip); border:2px solid var(--chip-b); border-bottom:none;
  border-radius:10px 10px 0 0; padding:6px 16px 9px; color:var(--muted);
}
.tab-btn.active{ background:var(--paper); color:var(--ink); }
.lesson-controls{ display:flex; gap:8px; align-items:center; margin:10px 0; flex-wrap:wrap; }
.lesson-controls select{ padding:6px 10px; border-radius:8px; border:1.5px solid var(--chip-b); background:var(--card); color:var(--ink); font-size:13px; }

/* =========================================================
   PAGE (notebook sheet)
   ========================================================= */
.page{
  position:relative;
  background: linear-gradient(var(--rule) 1px, transparent 1px) 0 46px/100% 30px, var(--paper);
  border:1px solid var(--paper-line); border-radius:0 10px 10px 10px;
  padding:34px 26px 40px 58px;
  box-shadow:0 20px 40px -20px var(--shadow);
  display:none;
}
.page.active{ display:block; animation:fadeIn .3s ease; }
@keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
.margin-line{ position:absolute; top:0; bottom:0; left:38px; width:2px; background:var(--margin); opacity:.6; }
.holes{ position:absolute; left:12px; top:26px; bottom:26px; display:flex; flex-direction:column; justify-content:space-between; }
.holes span{ width:10px;height:10px;border-radius:50%; background:radial-gradient(circle at 35% 30%, #fff, #cfc2a1 60%, #9c8c65 100%); box-shadow: inset 0 0 0 1px #b3a377; display:block; }
html[data-theme="dark"] .holes span{ background:radial-gradient(circle at 35% 30%, #555, #333 60%, #222 100%); box-shadow: inset 0 0 0 1px #444; }

.lecon-head{ font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--kraft-d); }
.lecon-title{ font-size:38px; margin:2px 0 4px; color:var(--ink); }
.lecon-title .fr-only{ font-weight:700; }
.lecon-sub{ font-size:14px; color:var(--muted); max-width:640px; margin-bottom:16px; }

/* =========================================================
   EXERCISE CARD
   ========================================================= */
.exo{
  background:var(--card); border:1px solid var(--paper-line); border-radius:12px;
  padding:16px 16px 14px; margin-bottom:18px; box-shadow:0 4px 10px -6px var(--shadow);
}
.exo-top{ display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; }
.exo-badge{ display:inline-flex; align-items:center; gap:6px; font-family:'Space Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; background:var(--ink); color:#fff; padding:3px 10px; border-radius:20px; }
.exo-title{ font-weight:800; font-size:16px; margin:8px 0 2px; }
.exo-instr{ font-size:13.5px; color:var(--muted); margin-bottom:4px; }
.instr-box{ background:var(--chip); border-radius:8px; padding:9px 13px; margin:8px 0 4px; font-size:13px; line-height:1.55; border-left:3px solid var(--kraft); }
.instr-box .fr-line{ font-family:'Patrick Hand',cursive; font-size:15.5px; color:var(--ink2); }
.instr-box .en-line{ color:var(--muted); margin-top:2px; }
.instr-box .lab{ font-family:'Space Mono',monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--kraft-d); margin-right:5px; }
.tip-toggle{ background:none; border:1px dashed var(--chip-b); border-radius:16px; font-size:11.5px; padding:3px 10px; color:var(--muted); margin-top:6px; }
.tip-box{ display:none; margin-top:8px; background:var(--chip); border-radius:8px; padding:10px 12px; font-size:12.8px; line-height:1.55; }
.tip-box.show{ display:block; }
.tip-box .lab{ font-weight:800; color:var(--kraft-d); margin-right:4px; }
.trick{ margin-top:6px; font-style:italic; }

.speak-btn{
  border:none; background:var(--chip); color:var(--ink); border-radius:50%;
  width:26px; height:26px; font-size:12px; flex:0 0 auto; line-height:1;
}
.speak-btn:hover{ background:var(--ink); color:#fff; }

.q-row{ display:flex; align-items:flex-start; gap:8px; margin:10px 0; flex-wrap:wrap; }
.q-num{ font-family:'Space Mono',monospace; color:var(--muted); font-size:11.5px; width:20px; padding-top:6px; }
.q-main{ flex:1; min-width:220px; }
.q-fr{ font-family:'Patrick Hand',cursive; font-size:16.5px; color:var(--ink2); }
.q-meta{ font-size:11.5px; color:var(--muted); margin-top:2px; }
.q-meta b{ color:var(--ink); }

input.qi{
  font-family:'Patrick Hand',cursive; font-size:16px; color:var(--ink2);
  border:none; border-bottom:2px dotted var(--muted); background:transparent; padding:2px 4px; outline:none; min-width:110px;
}
input.qi:focus{ border-bottom-color:var(--ink); }
input.qi.right{ border-bottom-color:var(--ok); background:var(--ok-bg); }
input.qi.wrong{ border-bottom-color:var(--bad); background:var(--bad-bg); }

.mc-opts{ display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
.opt{ border:1.5px solid var(--chip-b); border-radius:18px; padding:5px 13px; font-size:13px; background:var(--card); color:var(--ink); }
.opt.selected{ background:var(--ink); color:#fff; border-color:var(--ink); }
.opt.correct-mark{ background:var(--ok)!important; border-color:var(--ok)!important; color:#fff!important; }
.opt.wrong-mark{ background:var(--bad)!important; border-color:var(--bad)!important; color:#fff!important; }

.match-cols{ display:flex; gap:22px; flex-wrap:wrap; margin-top:6px; }
.match-col{ flex:1; min-width:210px; display:flex; flex-direction:column; gap:6px; }
.match-btn{ border:1.5px solid var(--chip-b); background:var(--card); color:var(--ink); border-radius:8px; padding:7px 10px; font-size:13px; text-align:left; }
.match-btn.sel{ background:var(--ink); color:#fff; }
.match-btn.paired{ background:var(--chip); border-style:dashed; }
.match-btn.correct-mark{ background:var(--ok-bg); border-color:var(--ok); }
.match-btn.wrong-mark{ background:var(--bad-bg); border-color:var(--bad); }
.pair-badge{ font-family:'Space Mono',monospace; font-size:10px; background:var(--kraft); color:#fff; border-radius:4px; padding:0 5px; margin-right:6px; }

.order-pool, .order-strip{ display:flex; gap:6px; flex-wrap:wrap; min-height:38px; padding:8px; border-radius:8px; }
.order-pool{ background:var(--chip); }
.order-strip{ background:var(--card); border:1.5px dashed var(--chip-b); margin-top:6px; }
.order-chip{ background:var(--card); border:1.5px solid var(--chip-b); border-radius:16px; padding:5px 11px; font-family:'Patrick Hand',cursive; font-size:15px; }
.order-strip .order-chip{ background:var(--ink); color:#fff; border-color:var(--ink); }

.vf-row{ display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:14px; }
.vf-row .stm{ flex:1; }
.vf-btn{ border:1.5px solid var(--chip-b); background:var(--card); color:var(--ink); border-radius:6px; width:32px; height:26px; font-weight:800; font-size:12px; }
.vf-btn.sel.t{ background:var(--ok); border-color:var(--ok); color:#fff; }
.vf-btn.sel.f{ background:var(--bad); border-color:var(--bad); color:#fff; }
.vf-btn.reveal{ outline:2px solid var(--ok); }

table.conj{ border-collapse:collapse; width:100%; font-size:13.5px; margin-top:6px; }
table.conj th, table.conj td{ border:1px solid var(--paper-line); padding:6px 8px; text-align:left; }
table.conj th{ background:var(--chip); font-family:'Space Mono',monospace; font-size:10.5px; text-transform:uppercase; color:var(--kraft-d); }
table.conj em{ color:var(--muted); font-style:normal; font-size:12px; }
table.conj input.qi{ width:92%; min-width:60px; }

.exo-controls{ margin-top:12px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.check-btn{ font-family:'Caveat',cursive; font-weight:700; font-size:18px; background:var(--ink); color:var(--paper); border:none; padding:7px 20px; border-radius:24px; box-shadow:0 3px 0 var(--kraft-d); }
.check-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--kraft-d); }
.reset-btn{ font-family:'Space Mono',monospace; font-size:11px; background:none; border:1px solid var(--chip-b); color:var(--muted); padding:6px 12px; border-radius:20px; }
.feedback{ font-family:'Patrick Hand',cursive; font-size:14.5px; }
.feedback.ok{ color:var(--ok); } .feedback.ko{ color:var(--bad); }

.explain-line{ font-size:12px; color:var(--muted); margin-top:3px; display:none; }
.explain-line.show{ display:block; }

/* summary / faq */
.summary-box, .faq-box{ background:var(--card); border-left:4px solid var(--kraft); border-radius:6px; padding:14px 16px; margin-top:6px; font-size:13.6px; line-height:1.6; }
.summary-box h4, .faq-box h4{ margin:0 0 8px; font-size:22px; color:var(--kraft-d); }
.faq-q{ font-weight:800; margin-top:10px; }
.faq-a{ margin:2px 0 0 0; color:var(--muted); }

/* vocab table */
.vocab-search{ width:100%; padding:9px 12px; border-radius:20px; border:1.5px solid var(--chip-b); margin-bottom:14px; font-size:14px; background:var(--card); color:var(--ink); }
.vocab-grid{ display:grid; grid-template-columns:1fr; gap:10px; }
.vocab-card{ background:var(--card); border:1px solid var(--paper-line); border-radius:10px; padding:10px 14px; }
.vocab-fr{ font-family:'Patrick Hand',cursive; font-size:18px; color:var(--ink2); display:flex; align-items:center; gap:8px; }
.vocab-meta{ font-size:12.5px; color:var(--muted); margin-top:3px; }

/* overlay for modes */
.overlay{ position:fixed; inset:0; background:rgba(10,10,15,.55); display:none; align-items:center; justify-content:center; z-index:100; padding:16px; }
.overlay.show{ display:flex; }
.modal{ background:var(--paper); border-radius:16px; max-width:560px; width:100%; max-height:88vh; overflow-y:auto; padding:22px; box-shadow:0 30px 60px -20px rgba(0,0,0,.5); }
.modal h2{ margin-top:0; font-size:30px; }
.modal-close{ float:right; background:none; border:none; font-size:20px; color:var(--muted); }
.mode-choice{ display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
.flash-card{ background:var(--card); border:1px solid var(--paper-line); border-radius:14px; padding:22px; text-align:center; margin-top:14px; min-height:150px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
.flash-front{ font-family:'Patrick Hand',cursive; font-size:26px; color:var(--ink2); }
.flash-back{ display:none; font-size:13.5px; color:var(--muted); text-align:left; width:100%; }
.flash-back.show{ display:block; }
.timer-badge{ font-family:'Space Mono',monospace; background:var(--bad); color:#fff; padding:4px 10px; border-radius:14px; font-size:13px; float:right; }

.stamp{ position:absolute; top:6px; right:16px; width:96px; height:96px; border:3px solid var(--corr, var(--bad)); border-radius:50%; color:var(--bad); align-items:center; justify-content:center; text-align:center; font-family:'Patrick Hand',cursive; font-size:13px; line-height:1.15; transform:rotate(-10deg); opacity:0; display:none; mix-blend-mode:multiply; }
html[data-theme="dark"] .stamp{ mix-blend-mode:normal; }
.stamp.show{ display:flex; animation:stampIn .35s cubic-bezier(.2,1.4,.5,1) forwards; }
@keyframes stampIn{ 0%{opacity:0; transform:rotate(-10deg) scale(2.2);} 60%{opacity:1;} 100%{opacity:.85; transform:rotate(-10deg) scale(1);} }

.badge-complete{ display:inline-flex; align-items:center; gap:5px; background:var(--ok); color:#fff; font-size:11.5px; padding:3px 10px; border-radius:14px; font-weight:800; }

.footer-note{ text-align:center; font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); margin-top:26px; }

@media print{
  .topbar, .nav-wrap, .footer-note, .speak-btn, .tip-toggle, .exo-controls, .check-btn, .reset-btn, .no-print { display:none !important; }
  body{ background:#fff !important; padding:0 !important; }
  .page{ display:block !important; box-shadow:none !important; border:none !important; }
  .overlay{ position:static !important; background:none !important; padding:0 !important; }
  .overlay:not(.show){ display:none !important; }
  .modal{ box-shadow:none !important; max-height:none !important; overflow:visible !important; max-width:100% !important; }
  .modal-close{ display:none !important; }
  .stamp{ display:none !important; }
  input.qi{ border-bottom:1px solid #999 !important; }
}
@media (max-width:640px){
  .page{ padding:26px 14px 30px 42px; }
  .holes{ display:none; }
  .margin-line{ left:22px; }
  .brand h1{ font-size:21px; }
  .lecon-title{ font-size:30px; }
  .match-cols{ flex-direction:column; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="wrap" style="padding:0;">
    <div class="topbar-row">
      <div class="brand">
        <div>
          <h1>📘 Festival — Cahier interactif</h1>
          <small>FRENCH · ENGLISH — Leçon 0 → 4</small>
        </div>
      </div>
      <div class="top-actions">
        <button class="btn" onclick="openMode('practice')">🎯 Practice</button>
        <button class="btn" onclick="openMode('exam')">⏱️ Exam</button>
        <button class="btn" onclick="openMode('revision')">🔄 Revision</button>
        <button class="btn" onclick="openMistakes()">🩹 Mistakes</button>
        <button class="btn" onclick="openAnswerKey()">📖 Answers</button>
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>
      </div>
    </div>
    <div class="scoreboard">
      <div class="pill">⭐ Global: <b id="gScore">0/0</b></div>
      <div class="pill">📊 <b id="gPct">0%</b></div>
      <div class="pill stars" id="gStars">☆☆☆</div>
      <div class="pill">🩹 Mistakes saved: <b id="gMist">0</b></div>
      <div class="pill" id="savedPill">💾 <span id="savedText">Progress saves automatically in this browser</span></div>
    </div>
    <div class="progress-outer"><div class="progress-inner" id="gBar"></div></div>
  </div>
</div>

<div class="wrap">
  <div class="nav-wrap">
    <div class="tabs" id="tabBar"></div>
    <div class="lesson-controls">
      <button class="btn small" onclick="prevLesson()">← Previous</button>
      <select id="jumpSelect" onchange="jumpTo(this.value)"></select>
      <button class="btn small" onclick="nextLesson()">Next →</button>
      <button class="btn small" onclick="restartLesson()">↺ Restart Lesson</button>
      <button class="btn small" onclick="restartWorkbook()">🗑️ Restart Workbook</button>
      <button class="btn small" onclick="window.print()">🖨️ Print this lesson</button>
    </div>
  </div>

  <div id="lessonHost"></div>

  <div class="footer-note">FESTIVAL Méthode de français 1 (CLE International) — cahier de révision trilingue FR/EN/TE, pour étude autonome.</div>
</div>

<!-- MODE OVERLAY -->
<div class="overlay" id="overlay">
  <div class="modal" id="modalBody"></div>
</div>

<script>
/* =========================================================
   HELPERS
   ========================================================= */
function speak(text){
  if(!('speechSynthesis' in window)){ alert('La synthèse vocale n\'est pas disponible sur ce navigateur.'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR'; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}
function escapeAttr(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function speakBtn(text){ return `<button type="button" class="speak-btn" title="Écouter" data-speak="${escapeAttr(text)}">🔊</button>`; }
document.addEventListener('click', function(e){
  const btn = e.target.closest('.speak-btn');
  if(btn){ speak(btn.dataset.speak || btn.getAttribute('data-speak') || ''); }
});
function norm(s){ return (s||'').trim().toLowerCase().replace(/\s+/g,' ').replace(/[’]/g,"'"); }
function matchAny(val, ans){ return ans.split(',').map(norm).includes(norm(val)); }
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function metaLine(it){
  const pron = it.pe ? `<span class="pron-hint">(${it.pe})</span>` : '';
  return `<div class="q-meta">
    <b>English meaning:</b> ${it.me||''} &nbsp;·&nbsp;
    <b>🔊 Say it:</b> ${pron}
  </div>`;
}

/* =========================================================
   DATA — 5 LESSONS
   fields per item: fr / pe (pronunciation, English-friendly) / pt (Telugu script pronunciation)
   me (English meaning) / mt (Telugu meaning)
   ========================================================= */
const LESSONS = [
{
  id:'l0', tag:'Leçon 0', title:'Le français, les Français, la France',
  sub:'Numbers, regions and famous French people — the warm-up before Unité 1.',
  exercises:[
    { id:'e1', type:'fill', title:'Numbers 0–20: digit → French', badge:'Numbers',
      frInstr:'Écrivez en lettres.', enInstr:'Write the number in words.', peInstr:'ay-kree-vay ahn letr',

/* Flatten a vocabulary list for the Vocabulaire tab + Revision flashcards */
const VOCAB = [];
LESSONS.forEach(L=>{
  L.exercises.forEach(ex=>{
    const pool = ex.items || ex.pairs || [];
    pool.forEach(it=>{
      const fr = it.fr || it.q || it.l || it.sentence || it.s;
      if(!fr) return;
      VOCAB.push({
        fr: fr.replace('___','…'),
        pe: it.pe||'', pt: it.pt||'', me: it.me||'', mt: it.mt||'',
        lesson: L.tag
      });
    });
  });
});
VOCAB.sort((a,b)=> a.fr.localeCompare(b.fr,'fr'));

/* Flattened quiz pool (fill / mcq / truefalse / gender) for Practice & Exam modes */
const QUIZ_POOL = [];
LESSONS.forEach(L=>{
  L.exercises.forEach(ex=>{
    if(ex.type==='fill' || ex.type==='gender'){
      (ex.items||[]).forEach(it=>{
        QUIZ_POOL.push({kind:'fill', q: (it.fr||'').replace('___','_____'), a: it.a, me: it.me, mt: it.mt, lesson:L.tag});
      });
    } else if(ex.type==='mcq'){
      (ex.items||[]).forEach(it=>{
        QUIZ_POOL.push({kind:'mcq', q: it.q, opts: it.opts, ans: it.opts[it.ans], me: it.me, mt: it.mt, lesson:L.tag});
      });
    } else if(ex.type==='truefalse'){
      (ex.items||[]).forEach(it=>{
        QUIZ_POOL.push({kind:'tf', q: it.s, a: it.ans?'Vrai':'Faux', me: it.ex, lesson:L.tag});
      });
    }
  });
});

/* =========================================================
   STATE
   ========================================================= */
let STATE = { theme:'light', lessonIdx:0, scores:{}, mistakes:[] };
function loadState(){
  try{
    const s = JSON.parse(localStorage.getItem('festivalState')||'{}');
    STATE = Object.assign(STATE, s);
  }catch(e){}
}
function saveState(){
  localStorage.setItem('festivalState', JSON.stringify(STATE));
  const el = document.getElementById('savedText');
  if(el){
    el.textContent = '✅ Saved just now';
    clearTimeout(window._savedTimer);
    window._savedTimer = setTimeout(()=>{ if(el) el.textContent = 'Progress saves automatically in this browser'; }, 1800);
  }
}

function toggleTheme(){
  STATE.theme = STATE.theme==='light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', STATE.theme);
  document.getElementById('themeBtn').textContent = STATE.theme==='light' ? '🌙' : '☀️';
  saveState();
}

/* =========================================================
   RENDER: TABS + LESSON PAGES
   ========================================================= */
function buildTabs(){
  const bar = document.getElementById('tabBar');
  bar.innerHTML = LESSONS.map((L,i)=>`<button class="tab-btn ${i===STATE.lessonIdx?'active':''}" onclick="jumpTo(${i})">${L.tag}</button>`).join('')
    + `<button class="tab-btn" onclick="openVocab()">📚 Vocabulaire</button>`;
  const sel = document.getElementById('jumpSelect');
  sel.innerHTML = LESSONS.map((L,i)=>`<option value="${i}" ${i===STATE.lessonIdx?'selected':''}>${L.tag} — ${L.title}</option>`).join('');
}
function jumpTo(i){ STATE.lessonIdx = parseInt(i); saveState(); renderAll(); }
function prevLesson(){ if(STATE.lessonIdx>0){ STATE.lessonIdx--; saveState(); renderAll(); } }
function nextLesson(){ if(STATE.lessonIdx<LESSONS.length-1){ STATE.lessonIdx++; saveState(); renderAll(); } }

function exoState(lid, eid){
  STATE.scores[lid] = STATE.scores[lid] || {};
  STATE.scores[lid][eid] = STATE.scores[lid][eid] || {done:false, right:0, total:0};
  return STATE.scores[lid][eid];
}

function renderLesson(){
  const L = LESSONS[STATE.lessonIdx];
  const host = document.getElementById('lessonHost');
  let html = `<div class="page active" data-lesson="${L.id}">
    <div class="holes"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="margin-line"></div>
    <div class="lecon-head">${L.tag}</div>
    <h2 class="lecon-title">${L.title}</h2>
    <div class="lecon-sub">${L.sub}</div>`;

  L.exercises.forEach(ex=>{
    html += renderExercise(L.id, ex);
  });

  html += `<div class="summary-box"><h4>📝 Grammar summary</h4>
    <div><b>EN:</b> ${L.summary.en}</div>
    </div>`;

  html += `<div class="faq-box"><h4>🙋 Possible doubts</h4>`;
  L.faq.forEach(f=>{ html += `<div class="faq-q">Q: ${f.q}</div><div class="faq-a">A: ${f.a}</div>`; });
  html += `</div>`;

  html += `</div>`;
  host.innerHTML = html;

  L.exercises.forEach(ex=> initExercise(L.id, ex));
}

function renderExercise(lid, ex){
  let body = '';
  if(ex.type==='fill' || ex.type==='gender'){ body = tplFillItems(ex.items); }
  else if(ex.type==='mcq'){ body = tplMCQ(ex.items); }
  else if(ex.type==='mcqchoice'){ body = tplMCQChoice(ex.items); }
  else if(ex.type==='match'){ body = tplMatch(lid, ex); }
  else if(ex.type==='order'){ body = tplOrder(lid, ex); }
  else if(ex.type==='truefalse'){ body = tplTrueFalse(ex); }
  else if(ex.type==='table'){ body = tplTable(ex.verbs); }

  return `<div class="exo" id="exo-${lid}-${ex.id}" data-type="${ex.type}">
    <div class="stamp" id="stamp-${lid}-${ex.id}">CORRIGÉ<br>✓</div>
    <div class="exo-top">
      <span class="exo-badge">${ex.badge}</span>
      <span id="badgeComplete-${lid}-${ex.id}"></span>
    </div>
    <div class="exo-title">${ex.title}</div>
    ${ex.frInstr ? `<div class="instr-box">
      <div class="fr-line">${speakBtn(ex.frInstr)} <span class="lab">FR (original — Festival cahier)</span><br>${ex.frInstr}</div>
      <div class="en-line"><span class="lab">English pronunciation</span><br>${ex.peInstr||''}</div>
      <div class="en-line"><span class="lab">English translation</span><br>${ex.enInstr||''}</div>
    </div>` : ''}
    <button class="tip-toggle" onclick="this.nextElementSibling.classList.toggle('show')">💡 Grammar Tip</button>
    <div class="tip-box">
      <div><span class="lab">EN:</span>${ex.grammarEn||''}</div>
      <div class="te" style="margin-top:6px;"><span class="lab">TE:</span>${ex.grammarTe||''}</div>
      <div class="trick">🧠 ${ex.trick||''}</div>
    </div>
    <div style="margin-top:10px;">${body}</div>
    <div class="exo-controls">
      <button class="check-btn" onclick="checkExercise('${lid}','${ex.id}')">✅ Corriger</button>
      <button class="reset-btn" onclick="resetExercise('${lid}','${ex.id}')">↺ Effacer</button>
      <span class="feedback" id="fb-${lid}-${ex.id}"></span>
    </div>
  </div>`;
}

/* ---- templates for each exercise type ---- */
function tplFillItems(items){
  return items.map((it,i)=>{
    const hasBlank = (it.fr||'').indexOf('___') !== -1;
    const pronBracket = it.pe ? `<span class="pron-bracket">🔊 ${it.pe}</span>` : '';
    const questionHtml = hasBlank
      ? it.fr.replace('___', `<input type="text" class="qi" data-i="${i}"> ${pronBracket}`)
      : `${it.fr} &nbsp;→&nbsp; <input type="text" class="qi" data-i="${i}" placeholder="…"> ${pronBracket}`;
    return `
    <div class="q-row">
      <div class="q-num">${i+1}.</div>
      <div class="q-main">
        <div class="q-fr">${speakBtn((it.fr||'').replace('___','...'))} ${questionHtml}</div>
        ${metaLine(it)}
      </div>
    </div>`;
  }).join('');
}
function tplMCQ(items){
  return items.map((it,i)=>`
    <div class="q-row">
      <div class="q-num">${i+1}.</div>
      <div class="q-main">
        <div class="q-fr">${speakBtn(it.q)} ${it.q}</div>
        <div class="mc-opts" data-i="${i}">
          ${it.opts.map(o=>`<button type="button" class="opt" data-val="${o}">${o}</button>`).join('')}
        </div>
        ${metaLine(it)}
      </div>
    </div>`).join('');
}
function tplMCQChoice(items){
  return items.map((it,i)=>`
    <div class="q-row">
      <div class="q-num">${i+1}.</div>
      <div class="q-main">
        <div class="mc-opts" data-i="${i}">
          ${it.opts.map(o=>`<button type="button" class="opt" data-val="${o}">${speakBtn(o)} ${o}</button>`).join('')}
        </div>
        <div class="explain-line" id="exp-${i}">${it.me||''}<br></div>
      </div>
    </div>`).join('');
}
function tplMatch(lid, ex){
  const n = ex.pairs.length;
  const shuffledRight = shuffle(ex.pairs.map((p,i)=>({...p, orig:i})));
  return `<div class="match-cols">
    <div class="match-col" data-side="left">
      ${ex.pairs.map((p,i)=>`<button type="button" class="match-btn" data-i="${i}">${speakBtn(p.l)} ${p.l}</button>`).join('')}
    </div>
    <div class="match-col" data-side="right">
      ${shuffledRight.map(p=>`<button type="button" class="match-btn" data-orig="${p.orig}">${p.r}</button>`).join('')}
    </div>
  </div>
  <div id="matchMeta-${lid}-${ex.id}" style="margin-top:8px;"></div>`;
}
function tplOrder(lid, ex){
  return ex.items.map((it,i)=>{
    const words = shuffle(it.sentence.replace(/\.$/,'').split(' ')).map((w,wi)=>`<button type="button" class="order-chip" data-w="${w}">${w}</button>`).join('');
    return `<div class="q-row" style="display:block;">
      <div class="q-num" style="display:inline-block;">${i+1}.</div>
      <div class="order-pool" data-i="${i}">${words}</div>
      <div class="order-strip" data-i="${i}"></div>
      <div class="q-meta" style="margin-top:4px;"><b>EN:</b> ${it.me} &nbsp;·&nbsp; </div>
    </div>`;
  }).join('');
}
function tplTrueFalse(ex){
  let html = `<div class="civ-box" style="background:var(--chip);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:10px;">
    ${speakBtn(ex.passage)} ${ex.passage}
    ${ex.passageEn ? `<div style="margin-top:8px;color:var(--muted);"><span class="lab" style="font-family:'Space Mono',monospace;font-size:9.5px;text-transform:uppercase;">English translation</span><br>${ex.passageEn}</div>` : ''}
  </div>`;
  html += ex.items.map((it,i)=>`
    <div class="vf-row" data-i="${i}">
      <div class="stm">${speakBtn(it.s)} ${i+1}. ${it.s}<br><span style="font-size:11.5px;color:var(--muted);">EN: ${it.me||''}</span></div>
      <div class="btns">
        <button type="button" class="vf-btn" data-v="true" onclick="setVF(this)">V</button>
        <button type="button" class="vf-btn" data-v="false" onclick="setVF(this)">F</button>
      </div>
    </div>`).join('');
  return html;
}
function tplTable(verbs){
  const persons = ['je','tu','il','vous','ils'];
  let html = `<table class="conj"><tr><th>infinitif</th>${persons.map(p=>`<th>${p}</th>`).join('')}</tr>`;
  verbs.forEach((v,vi)=>{
    html += `<tr><td><b>${v.inf}</b></td>`;
    persons.forEach(p=>{
      if(v[p]===undefined){ html += `<td>—</td>`; }
      else if((vi+persons.indexOf(p))%3===0){ html += `<td><em>${v[p]}</em></td>`; }
      else { html += `<td><input type="text" class="qi" data-vi="${vi}" data-p="${p}"></td>`; }
    });
    html += `</tr>`;
  });
  html += `</table>`;
  return html;
}

/* =========================================================
   INIT interactions per exercise type
   ========================================================= */
function initExercise(lid, ex){
  const root = document.getElementById(`exo-${lid}-${ex.id}`);
  if(!root) return;
  if(ex.type==='mcq' || ex.type==='mcqchoice'){
    root.querySelectorAll('.opt').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const group = btn.closest('.mc-opts');
        group.querySelectorAll('.opt').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    });
  }
  if(ex.type==='match'){
    root._matchPairs = {}; // leftIdx -> rightBtn element
    root.querySelectorAll('.match-btn[data-side], .match-col[data-side="left"] .match-btn, .match-col[data-side="right"] .match-btn').forEach(()=>{});
    const leftBtns = root.querySelectorAll('.match-col[data-side="left"] .match-btn');
    const rightBtns = root.querySelectorAll('.match-col[data-side="right"] .match-btn');
    let selLeft = null;
    leftBtns.forEach(b=>{
      b.addEventListener('click', ()=>{
        if(b.classList.contains('paired')){ unpair(b); return; }
        leftBtns.forEach(x=>x.classList.remove('sel'));
        selLeft = b; b.classList.add('sel');
      });
    });
    rightBtns.forEach(b=>{
      b.addEventListener('click', ()=>{
        if(b.classList.contains('paired')){ 
          const li = Object.keys(root._matchPairs).find(k=>root._matchPairs[k]===b);
          if(li!==undefined) unpair(root.querySelector(`.match-col[data-side="left"] .match-btn[data-i="${li}"]`));
          return;
        }
        if(!selLeft) return;
        const li = selLeft.dataset.i;
        root._matchPairs[li] = b;
        selLeft.classList.add('paired'); selLeft.classList.remove('sel');
        b.classList.add('paired');
        selLeft = null;
      });
    });
    function unpair(leftBtn){
      const li = leftBtn.dataset.i;
      const rb = root._matchPairs[li];
      if(rb) rb.classList.remove('paired');
      leftBtn.classList.remove('paired');
      delete root._matchPairs[li];
    }
  }
  if(ex.type==='order'){
    root.querySelectorAll('.order-pool').forEach(pool=>{
      pool.querySelectorAll('.order-chip').forEach(chip=>{
        chip.addEventListener('click', ()=>{
          const strip = root.querySelector(`.order-strip[data-i="${pool.dataset.i}"]`);
          strip.appendChild(chip);
        });
      });
    });
    root.querySelectorAll('.order-strip').forEach(strip=>{
      strip.addEventListener('click', (e)=>{
        if(e.target.classList.contains('order-chip')){
          const pool = root.querySelector(`.order-pool[data-i="${strip.dataset.i}"]`);
          pool.appendChild(e.target);
        }
      });
    });
  }
}
function setVF(btn){
  const row = btn.closest('.vf-row');
  row.querySelectorAll('.vf-btn').forEach(b=>{ b.classList.remove('sel','t','f'); });
  btn.classList.add('sel', btn.dataset.v==='true'?'t':'f');
}

/* =========================================================
   CHECK / SCORE
   ========================================================= */
function checkExercise(lid, eid){
  const L = LESSONS.find(l=>l.id===lid);
  const ex = L.exercises.find(e=>e.id===eid);
  const root = document.getElementById(`exo-${lid}-${eid}`);
  let right=0, total=0;

  if(ex.type==='fill' || ex.type==='gender'){
    total = ex.items.length;
    root.querySelectorAll('input.qi[data-i]').forEach(inp=>{
      const it = ex.items[parseInt(inp.dataset.i)];
      const ok = inp.value.trim()!=='' && matchAny(inp.value, it.a);
      inp.classList.remove('right','wrong'); inp.classList.add(ok?'right':'wrong');
      if(ok) right++; else logMistake(lid,eid,`Q: ${it.fr}`, it.a.split(',')[0], {kind:'fill', q:(it.fr||'').replace('___','_____'), a: it.a, me: it.me, mt: it.mt, lesson: L.tag});
    });
  }
  else if(ex.type==='mcq'){
    total = ex.items.length;
    root.querySelectorAll('.mc-opts').forEach(group=>{
      const it = ex.items[parseInt(group.dataset.i)];
      const correct = it.opts[it.ans];
      const sel = group.querySelector('.opt.selected');
      group.querySelectorAll('.opt').forEach(o=>{
        o.classList.remove('correct-mark','wrong-mark');
        if(o.dataset.val===correct) o.classList.add('correct-mark');
      });
      if(sel && sel.dataset.val===correct) right++;
      else { if(sel) sel.classList.add('wrong-mark'); logMistake(lid,eid,`Q: ${it.q}`, correct, {kind:'mcq', q: it.q, opts: it.opts, a: correct, me: it.me, mt: it.mt, lesson: L.tag}); }
    });
  }
  else if(ex.type==='mcqchoice'){
    total = ex.items.length;
    root.querySelectorAll('.mc-opts').forEach((group,gi)=>{
      const it = ex.items[gi];
      const sel = group.querySelector('.opt.selected');
      group.querySelectorAll('.opt').forEach(o=>{
        o.classList.remove('correct-mark','wrong-mark');
        if(o.dataset.val===it.ans) o.classList.add('correct-mark');
      });
      const explainEl = root.querySelector(`#exp-${gi}`); if(explainEl) explainEl.classList.add('show');
      if(sel && sel.dataset.val===it.ans) right++;
      else { if(sel) sel.classList.add('wrong-mark'); logMistake(lid,eid,`Odd one out among: ${it.opts.join(', ')}`, it.ans); }
    });
  }
  else if(ex.type==='match'){
    total = ex.pairs.length;
    const pairs = root._matchPairs || {};
    root.querySelectorAll('.match-btn').forEach(b=>b.classList.remove('correct-mark','wrong-mark'));
    Object.keys(pairs).forEach(li=>{
      const rightBtn = pairs[li];
      const leftBtn = root.querySelector(`.match-col[data-side="left"] .match-btn[data-i="${li}"]`);
      const ok = rightBtn.dataset.orig === li;
      leftBtn.classList.add(ok?'correct-mark':'wrong-mark');
      rightBtn.classList.add(ok?'correct-mark':'wrong-mark');
      if(ok) right++; else logMistake(lid,eid,`Match: ${ex.pairs[li].l}`, ex.pairs[li].r);
    });
  }
  else if(ex.type==='order'){
    total = ex.items.length;
    root.querySelectorAll('.order-strip').forEach(strip=>{
      const it = ex.items[parseInt(strip.dataset.i)];
      const built = Array.from(strip.querySelectorAll('.order-chip')).map(c=>c.dataset.w).join(' ');
      const ok = norm(built.replace(/[.,]$/,'')) === norm(it.sentence.replace(/[.,]$/,''));
      strip.style.outline = ok ? '2px solid var(--ok)' : '2px solid var(--bad)';
      if(ok) right++; else logMistake(lid,eid,`Order: (scrambled sentence)`, it.sentence);
    });
  }
  else if(ex.type==='truefalse'){
    total = ex.items.length;
    root.querySelectorAll('.vf-row').forEach(row=>{
      const it = ex.items[parseInt(row.dataset.i)];
      const sel = row.querySelector('.vf-btn.sel');
      row.querySelectorAll('.vf-btn').forEach(b=>b.classList.remove('reveal'));
      const correctVal = it.ans ? 'true':'false';
      const ok = sel && sel.dataset.v===correctVal;
      if(!ok) row.querySelector(`.vf-btn[data-v="${correctVal}"]`).classList.add('reveal');
      if(ok) right++; else logMistake(lid,eid,`V/F: ${it.s}`, it.ans?'Vrai':'Faux', {kind:'tf', q: it.s, a: it.ans?'Vrai':'Faux', me: it.me, lesson: L.tag});
    });
  }
  else if(ex.type==='table'){
    const inputs = root.querySelectorAll('input.qi[data-vi]');
    total = inputs.length;
    inputs.forEach(inp=>{
      const v = ex.verbs[parseInt(inp.dataset.vi)];
      const correct = v[inp.dataset.p];
      const ok = inp.value.trim()!=='' && matchAny(inp.value, correct);
      inp.classList.remove('right','wrong'); inp.classList.add(ok?'right':'wrong');
      if(ok) right++; else logMistake(lid,eid,`${v.inf} (${inp.dataset.p})`, correct);
    });
  }

  const st = exoState(lid,eid);
  st.done = true; st.right = right; st.total = total;
  saveState();

  const fb = document.getElementById(`fb-${lid}-${eid}`);
  fb.className = 'feedback ' + (right===total ? 'ok':'ko');
  fb.textContent = `${right} / ${total}` + (right===total ? '  Parfait ! 🎉' : '  regarde les corrections en couleur');
  const stamp = document.getElementById(`stamp-${lid}-${eid}`);
  stamp.classList.remove('show'); void stamp.offsetWidth; stamp.classList.add('show');
  document.getElementById(`badgeComplete-${lid}-${eid}`).innerHTML = right===total ? '<span class="badge-complete">✓ Terminé</span>' : '';

  updateGlobalUI();
}

function logMistake(lid,eid,q,ans,extra){
  const entry = Object.assign({lid,eid,q,ans,ts:Date.now()}, extra||{});
  STATE.mistakes.push(entry);
  if(STATE.mistakes.length>300) STATE.mistakes = STATE.mistakes.slice(-300);
  saveState();
}

function resetExercise(lid,eid){
  const root = document.getElementById(`exo-${lid}-${eid}`);
  root.querySelectorAll('input.qi').forEach(i=>{ i.value=''; i.classList.remove('right','wrong'); });
  root.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected','correct-mark','wrong-mark'));
  root.querySelectorAll('.match-btn').forEach(b=>b.classList.remove('sel','paired','correct-mark','wrong-mark'));
  root._matchPairs = {};
  root.querySelectorAll('.order-strip').forEach(strip=>{
    const pool = root.querySelector(`.order-pool[data-i="${strip.dataset.i}"]`);
    Array.from(strip.querySelectorAll('.order-chip')).forEach(c=>pool.appendChild(c));
    strip.style.outline='';
  });
  root.querySelectorAll('.vf-btn').forEach(b=>b.classList.remove('sel','t','f','reveal'));
  root.querySelectorAll('.explain-line').forEach(e=>e.classList.remove('show'));
  const fb = root.querySelector('.feedback'); if(fb){ fb.textContent=''; fb.className='feedback'; }
  document.getElementById(`stamp-${lid}-${eid}`).classList.remove('show');
  document.getElementById(`badgeComplete-${lid}-${eid}`).innerHTML='';
  const st = exoState(lid,eid); st.done=false; st.right=0; st.total=0; saveState();
  updateGlobalUI();
}

function restartLesson(){
  if(!confirm('Restart this lesson? All answers in this lesson will be cleared.')) return;
  const L = LESSONS[STATE.lessonIdx];
  STATE.scores[L.id] = {};
  saveState();
  renderAll();
}
function restartWorkbook(){
  if(!confirm('Restart the WHOLE workbook? All scores and saved mistakes will be erased.')) return;
  STATE.scores = {}; STATE.mistakes = [];
  saveState();
  renderAll();
}

/* =========================================================
   GLOBAL SCORE UI
   ========================================================= */
function updateGlobalUI(){
  let right=0, total=0, done=0, exoCount=0;
  LESSONS.forEach(L=>{
    L.exercises.forEach(ex=>{
      exoCount++;
      const st = (STATE.scores[L.id]||{})[ex.id];
      if(st && st.done){ done++; right += st.right; total += st.total; }
    });
  });
  document.getElementById('gScore').textContent = `${right}/${total}`;
  const pct = total ? Math.round(right/total*100) : 0;
  document.getElementById('gPct').textContent = pct+'%';
  document.getElementById('gBar').style.width = (exoCount? (done/exoCount*100):0)+'%';
  const starCount = pct>=85 ? 3 : pct>=60 ? 2 : pct>0 ? 1 : 0;
  document.getElementById('gStars').textContent = '★'.repeat(starCount) + '☆'.repeat(3-starCount);
  document.getElementById('gMist').textContent = STATE.mistakes.length;
}

function renderAll(){
  buildTabs();
  renderLesson();
  updateGlobalUI();
}

/* =========================================================
   VOCABULARY VIEW
   ========================================================= */
function openVocab(){
  const modal = document.getElementById('modalBody');
  modal.innerHTML = `<button class="modal-close" onclick="closeModal()">✕</button>
    <h2>📚 Vocabulaire</h2>
    <input class="vocab-search" placeholder="Rechercher un mot… / Search a word…" oninput="filterVocab(this.value)">
    <div class="vocab-grid" id="vocabGrid"></div>`;
  document.getElementById('overlay').classList.add('show');
  filterVocab('');
}
function filterVocab(q){
  q = norm(q);
  const grid = document.getElementById('vocabGrid');
  const list = VOCAB.filter(v=> !q || norm(v.fr).includes(q) || norm(v.me).includes(q));
  grid.innerHTML = list.slice(0,120).map(v=>`
    <div class="vocab-card">
      <div class="vocab-fr">${speakBtn(v.fr)} ${v.fr} <span style="font-size:11px;color:var(--muted);font-weight:400;">(${v.lesson})</span></div>
      <div class="vocab-meta"><b>EN:</b> ${v.me}<br><b>🔊 Say it:</b> <span class="pron-hint">${v.pe}</span></div>
    </div>`).join('') || '<p style="color:var(--muted);">Aucun résultat.</p>';
}
function closeModal(){ document.getElementById('overlay').classList.remove('show'); document.getElementById('modalBody').innerHTML=''; }

/* =========================================================
   MISTAKE REVIEW
   ========================================================= */
function openMistakes(){
  const modal = document.getElementById('modalBody');
  const list = STATE.mistakes.slice().reverse();
  const retryCount = countRetryableMistakes();
  modal.innerHTML = `<button class="modal-close" onclick="closeModal()">✕</button>
    <h2>🩹 Mistake Review</h2>
    <p style="color:var(--muted);font-size:13px;">Every wrong answer you've made gets saved here so you can review it.</p>
    ${retryCount>0 ? `<button class="btn primary" onclick="practiceMistakesNow()">🎯 Practice these ${retryCount} mistakes</button>` : ''}
    ${list.length===0 ? '<p style="margin-top:12px;">No mistakes recorded yet — nice work! 🎉</p>' :
      list.slice(0,60).map(m=>`<div class="vocab-card" style="margin-top:10px;"><div class="vocab-fr" style="font-size:14px;">${m.q}</div>
      <div class="vocab-meta">✅ Correct answer: <b>${m.ans}</b></div></div>`).join('')}
    ${list.length>0 ? '<button class="btn" style="margin-top:12px;" onclick="if(confirm(\'Clear all saved mistakes?\')){STATE.mistakes=[];saveState();openMistakes();updateGlobalUI();}">Clear mistake list</button>' : ''}
  `;
  document.getElementById('overlay').classList.add('show');
}
function retryableMistakePool(){
  const pool = []; const seen = new Set();
  STATE.mistakes.forEach(m=>{
    if(m.kind && !seen.has(m.q)){ seen.add(m.q); pool.push({kind:m.kind, q:m.q, opts:m.opts, a:m.a, me:m.me, mt:m.mt, lesson:m.lesson}); }
  });
  return pool;
}
function countRetryableMistakes(){ return retryableMistakePool().length; }
function practiceMistakesNow(){
  const pool = retryableMistakePool();
  closeModal();
  startPractice(pool);
}

/* =========================================================
   ANSWER KEY (like the book's "Corrigés" pages)
   ========================================================= */
function answerLinesForExercise(ex){
  const lines = [];
  const pron  = (it)=> it && it.pe ? ` <span class="pron-hint" style="font-size:11px;">(${it.pe})</span>` : '';
  const mean  = (it)=> it && it.me ? ` <span style="color:var(--muted);font-size:12px;">— ${it.me}</span>` : '';

  if(ex.type==='fill' || ex.type==='gender'){
    (ex.items||[]).forEach((it,i)=>{
      const ans = (it.a||'').split(',')[0];
      lines.push(`${i+1}. ${(it.fr||'').replace('___','_____')} &nbsp;→&nbsp; ${speakBtn(ans)} <b>${ans}</b>${pron(it)}${mean(it)}`);
    });
  } else if(ex.type==='mcq'){
    (ex.items||[]).forEach((it,i)=>{
      const ans = it.opts[it.ans];
      lines.push(`${i+1}. ${it.q} &nbsp;→&nbsp; ${speakBtn(ans)} <b>${ans}</b>${pron(it)}${mean(it)}`);
    });
  } else if(ex.type==='mcqchoice'){
    (ex.items||[]).forEach((it,i)=>{
      lines.push(`${i+1}. ${it.opts.join(' – ')} &nbsp;→&nbsp; odd one out: ${speakBtn(it.ans)} <b>${it.ans}</b>${it.me ? ` <span style="color:var(--muted);font-size:12px;">— ${it.me}</span>` : ''}`);
    });
  } else if(ex.type==='match'){
    (ex.pairs||[]).forEach((p,i)=>{
      lines.push(`${i+1}. ${speakBtn(p.l)} ${p.l} &nbsp;→&nbsp; <b>${p.r}</b>${pron(p)}${mean(p)}`);
    });
  } else if(ex.type==='order'){
    (ex.items||[]).forEach((it,i)=>{
      lines.push(`${i+1}. ${speakBtn(it.sentence)} <b>${it.sentence}</b>${it.me ? ` <span style="color:var(--muted);font-size:12px;">— ${it.me}</span>` : ''}`);
    });
  } else if(ex.type==='truefalse'){
    (ex.items||[]).forEach((it,i)=>{
      lines.push(`${i+1}. ${speakBtn(it.s)} ${it.s} &nbsp;→&nbsp; <b>${it.ans ? 'Vrai' : 'Faux'}</b> <span style="color:var(--muted);">(${it.ex||''})</span>`);
    });
  } else if(ex.type==='table'){
    const persons=['je','tu','il','vous','ils'];
    (ex.verbs||[]).forEach(v=>{
      const forms = persons.filter(p=>v[p]!==undefined).map(p=>`${p}: <b>${v[p]}</b>`).join(', ');
      lines.push(`<b>${v.inf}</b> — ${forms}`);
    });
  }
  return lines;
}
function openAnswerKey(li){
  const idx = (li===undefined) ? STATE.lessonIdx : parseInt(li);
  const L = LESSONS[idx];
  const modal = document.getElementById('modalBody');
  const tabs = LESSONS.map((x,i)=>`<button class="btn small ${i===idx?'primary':''}" onclick="openAnswerKey(${i})">${x.tag}</button>`).join(' ');
  let body = `<button class="modal-close no-print" onclick="closeModal()">✕</button>
    <h2>📖 Answer key — Corrigés</h2>
    <p style="color:var(--muted);font-size:13px;" class="no-print">Just like the answer booklet at the back of the Festival cahier — every correct answer, exercise by exercise.</p>
    <div class="no-print" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">${tabs}
      <button class="btn small" onclick="window.print()">🖨️ Print this answer key</button>
    </div>
    <h3 style="margin:4px 0 2px;">${L.tag} — ${L.title}</h3>`;
  L.exercises.forEach(ex=>{
    const lines = answerLinesForExercise(ex);
    body += `<div class="vocab-card" style="margin-top:10px;">
      <div class="vocab-fr" style="font-size:14.5px;">${ex.badge} — ${ex.title}</div>
      <div class="vocab-meta" style="line-height:1.7;margin-top:6px;">${lines.join('<br>')}</div>
    </div>`;
  });
  modal.innerHTML = body;
  document.getElementById('overlay').classList.add('show');
}

/* =========================================================
   MODES: Practice / Exam / Revision
   ========================================================= */
let modeState = {};
function openMode(kind){
  if(kind==='revision'){ startRevision(); return; }
  if(kind==='practice'){ startPractice(); return; }
  if(kind==='exam'){ startExam(); return; }
}

function startPractice(customPool){
  const src = (customPool && customPool.length) ? customPool : QUIZ_POOL;
  modeState = { kind:'practice', pool: shuffle(src), idx:0, right:0, total:0, isCustom: !!(customPool && customPool.length) };
  showPracticeQuestion();
  document.getElementById('overlay').classList.add('show');
}
function showPracticeQuestion(){
  if(modeState.idx >= modeState.pool.length){
    const base = modeState.isCustom ? modeState.pool : QUIZ_POOL;
    modeState.pool = shuffle(base); modeState.idx = 0;
  }
  const item = modeState.pool[modeState.idx];
  const modal = document.getElementById('modalBody');
  modal.innerHTML = `<button class="modal-close" onclick="closeModal()">✕</button>
    <h2>🎯 Practice Mode${modeState.isCustom ? ' — your mistakes' : ''}</h2>
    <div style="font-size:12px;color:var(--muted);">Score: ${modeState.right}/${modeState.total} · ${item.lesson}</div>
    <div class="flash-card">
      <div class="flash-front">${speakBtn(item.q)} ${item.q}</div>
      ${item.kind==='mcq' ? `<div class="mc-opts">${item.opts.map(o=>`<button type="button" class="opt" onclick="answerPractice(this,'${(''+o).replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>`
        : item.kind==='tf' ? `<div class="mc-opts"><button type="button" class="opt" onclick="answerPractice(this,'Vrai')">Vrai</button><button type="button" class="opt" onclick="answerPractice(this,'Faux')">Faux</button></div>`
        : `<input type="text" class="qi" id="practInput" style="font-size:18px;" placeholder="Tapez votre réponse…"><br><button class="btn primary small" style="margin-top:10px;" onclick="answerPractice(null,document.getElementById('practInput').value)">Valider</button>`}
      <div id="practFeedback" style="margin-top:10px;font-size:13px;"></div>
    </div>`;
  if(item.kind==='fill'){
    setTimeout(()=>{
      const inp = document.getElementById('practInput');
      if(inp) inp.addEventListener('keydown', e=>{ if(e.key==='Enter') answerPractice(null, inp.value); });
    },0);
  }
}
function answerPractice(btn, val){
  const item = modeState.pool[modeState.idx];
  let ok;
  if(item.kind==='fill') ok = matchAny(val, item.a);
  else ok = norm(val)===norm(item.a);
  modeState.total++;
  if(ok){
    modeState.right++;
    if(modeState.isCustom){ STATE.mistakes = STATE.mistakes.filter(m => m.q !== item.q); }
  } else {
    logMistake('practice', item.lesson, item.q, item.a, {kind:item.kind, q:item.q, opts:item.opts, a:item.a, me:item.me, mt:item.mt, lesson:item.lesson});
  }
  const fb = document.getElementById('practFeedback');
  fb.innerHTML = (ok? `<span style="color:var(--ok);">✅ Correct !</span>` : `<span style="color:var(--bad);">❌ Réponse : <b>${item.a}</b></span>`) +
    `<div class="q-meta" style="margin-top:6px;">${item.me||''}</div>`;
  saveState(); updateGlobalUI();
  setTimeout(()=>{ modeState.idx++; showPracticeQuestion(); }, 1300);
}

function startExam(){
  const n = Math.min(12, QUIZ_POOL.length);
  modeState = { kind:'exam', pool: shuffle(QUIZ_POOL).slice(0,n), idx:0, right:0, wrongList:[], seconds:300, timer:null };
  modeState.timer = setInterval(()=>{
    modeState.seconds--;
    const tb = document.getElementById('examTimer');
    if(tb) tb.textContent = fmtTime(modeState.seconds);
    if(modeState.seconds<=0){ clearInterval(modeState.timer); finishExam(); }
  },1000);
  showExamQuestion();
  document.getElementById('overlay').classList.add('show');
}
function fmtTime(s){ const m=Math.floor(s/60), r=s%60; return `${m}:${r<10?'0':''}${r}`; }
function showExamQuestion(){
  if(modeState.idx >= modeState.pool.length){ finishExam(); return; }
  const item = modeState.pool[modeState.idx];
  const modal = document.getElementById('modalBody');
  modal.innerHTML = `<span class="timer-badge" id="examTimer">${fmtTime(modeState.seconds)}</span>
    <h2>⏱️ Exam Mode</h2>
    <div style="font-size:12px;color:var(--muted);">Question ${modeState.idx+1} / ${modeState.pool.length}</div>
    <div class="flash-card">
      <div class="flash-front">${speakBtn(item.q)} ${item.q}</div>
      ${item.kind==='mcq' ? `<div class="mc-opts">${item.opts.map(o=>`<button type="button" class="opt" onclick="answerExam('${(''+o).replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>`
        : item.kind==='tf' ? `<div class="mc-opts"><button type="button" class="opt" onclick="answerExam('Vrai')">Vrai</button><button type="button" class="opt" onclick="answerExam('Faux')">Faux</button></div>`
        : `<input type="text" class="qi" id="examInput" style="font-size:18px;" placeholder="Tapez votre réponse…"><br><button class="btn primary small" style="margin-top:10px;" onclick="answerExam(document.getElementById('examInput').value)">Valider</button>`}
    </div>`;
  if(item.kind==='fill'){
    setTimeout(()=>{
      const inp = document.getElementById('examInput');
      if(inp) inp.addEventListener('keydown', e=>{ if(e.key==='Enter') answerExam(inp.value); });
    },0);
  }
}
function answerExam(val){
  const item = modeState.pool[modeState.idx];
  let ok;
  if(item.kind==='fill') ok = matchAny(val, item.a);
  else ok = norm(val)===norm(item.a);
  if(ok) modeState.right++; else modeState.wrongList.push({q:item.q, given:val, correct:item.a});
  modeState.idx++;
  showExamQuestion();
}
function finishExam(){
  if(modeState.timer) clearInterval(modeState.timer);
  const total = modeState.pool.length;
  const pct = total ? Math.round(modeState.right/total*100) : 0;
  const modal = document.getElementById('modalBody');
  modal.innerHTML = `<button class="modal-close" onclick="closeModal()">✕</button>
    <h2>🏁 Exam results</h2>
    <div style="font-size:20px;font-weight:800;">${modeState.right} / ${total} — ${pct}%</div>
    <div class="stars" style="font-size:22px;">${'★'.repeat(pct>=85?3:pct>=60?2:pct>0?1:0)}${'☆'.repeat(3-(pct>=85?3:pct>=60?2:pct>0?1:0))}</div>
    <h3 style="margin-top:16px;">Review mistakes</h3>
    ${modeState.wrongList.length===0 ? '<p>Perfect score — no mistakes! 🎉</p>' :
      modeState.wrongList.map(w=>`<div class="vocab-card"><div class="vocab-fr" style="font-size:14px;">${w.q}</div>
      <div class="vocab-meta">Your answer: <i>${w.given||'(empty)'}</i><br>Correct answer: <b>${w.correct}</b></div></div>`).join('')}
    <button class="btn primary" style="margin-top:14px;" onclick="startExam()">Retake exam</button>`;
  modeState.wrongList.forEach(w=> logMistake('exam','exam', w.q, w.correct));
  saveState(); updateGlobalUI();
}

/* ---- Spaced repetition (simple Leitner box system, persisted) ---- */
function vocabStat(fr){
  STATE.vocabStats = STATE.vocabStats || {};
  if(!STATE.vocabStats[fr]) STATE.vocabStats[fr] = {box:1, due:0, known:0, unknown:0};
  return STATE.vocabStats[fr];
}
const BOX_INTERVAL_DAYS = [0, 0, 1, 3, 7, 14]; // index = box (1..5)
function buildRevisionDeck(){
  const now = Date.now();
  let dueWords = VOCAB.filter(v => vocabStat(v.fr).due <= now);
  if(dueWords.length === 0) dueWords = VOCAB.slice();
  let deck = [];
  dueWords.forEach(v=>{
    const box = vocabStat(v.fr).box;
    const reps = Math.max(1, 6 - box); // lower box (less known) = seen more often this session
    for(let i=0;i<reps;i++) deck.push(v);
  });
  return shuffle(deck);
}
function startRevision(){
  modeState = { kind:'revision', deck: buildRevisionDeck(), idx:0, known:0, unknown:0 };
  showRevisionCard();
  document.getElementById('overlay').classList.add('show');
}
function showRevisionCard(){
  if(modeState.idx >= modeState.deck.length){ modeState.deck = buildRevisionDeck(); modeState.idx=0; }
  const v = modeState.deck[modeState.idx];
  const st = vocabStat(v.fr);
  const modal = document.getElementById('modalBody');
  modal.innerHTML = `<button class="modal-close" onclick="closeModal()">✕</button>
    <h2>🔄 Revision Mode — flashcards</h2>
    <div style="font-size:12px;color:var(--muted);">Known: ${modeState.known} · To review: ${modeState.unknown} · ${v.lesson} · box ${st.box}/5</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">🧠 Spaced repetition: words you don't know resurface more often; words you know well come back after longer gaps.</div>
    <div class="flash-card">
      <div class="flash-front">${speakBtn(v.fr)} ${v.fr}</div>
      <button class="btn small" onclick="document.getElementById('revBack').classList.toggle('show')">👁️ Reveal meaning</button>
      <div class="flash-back" id="revBack">
        <b>EN:</b> ${v.me}<br><br>
        <b>English pronunciation:</b> ${v.pe} · 
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;">
        <button class="btn small" style="background:var(--ok);color:#fff;" onclick="revAnswer(true)">✅ Je savais</button>
        <button class="btn small" style="background:var(--bad);color:#fff;" onclick="revAnswer(false)">❌ Je ne savais pas</button>
      </div>
    </div>`;
}
function revAnswer(known){
  const v = modeState.deck[modeState.idx];
  const st = vocabStat(v.fr);
  const dayMs = 24*60*60*1000;
  if(known){
    st.known++; st.box = Math.min(5, st.box+1); st.due = Date.now() + BOX_INTERVAL_DAYS[st.box]*dayMs;
    modeState.known++;
    STATE.mistakes = STATE.mistakes.filter(m => !(m.kind==='vocab' && m.q===v.fr));
  } else {
    st.unknown++; st.box = 1; st.due = Date.now();
    modeState.unknown++;
    logMistake('revision', v.lesson, v.fr, v.me, {kind:'vocab', q:v.fr, a:v.me, me:v.me, mt:v.mt, lesson:v.lesson});
  }
  modeState.idx++;
  showRevisionCard();
  saveState(); updateGlobalUI();
}

function closeAndClearTimer(){
  if(modeState && modeState.timer) clearInterval(modeState.timer);
}
document.addEventListener('click', (e)=>{
  if(e.target.id==='overlay'){ closeAndClearTimer(); closeModal(); }
});

/* =========================================================
   BOOT
   ========================================================= */
loadState();
document.documentElement.setAttribute('data-theme', STATE.theme);
document.getElementById('themeBtn').textContent = STATE.theme==='light' ? '🌙' : '☀️';
renderAll();
</script>
